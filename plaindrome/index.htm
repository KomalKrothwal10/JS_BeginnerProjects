<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h1>Palindorme Number</h1>
        <div class="contain">
            <input type="number" placeholder="enter number here.." id="input">
            <button onclick="cPalindrome()" class="fetch">
                Check
            </button>
            <p id="para"></p>
        </div>
    </div>
    <script>
       

        function cPalindrome(){
            let inputV = parseInt(document.getElementById('input').value )
       
            let para = document.getElementById('para')
            let answer = 0

            let original = inputV

            while(inputV > 0){
                let last_digit = inputV % 10 

                answer = answer * 10 + last_digit

                 inputV = Math.floor(inputV / 10)
            }

            if(original === answer){
                para.textContent = `${inputV} is a Palindorme Number.`
                para.style.color = "blue"
            }
            else{
                para.textContent = `${inputV} is not a Palindrome Number`
                para.style.color = "red"
            }

        }
    </script>
    
</body>
</html>
