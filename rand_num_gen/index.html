<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
        gap: 12px;
      }
      .contain {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 12px;
        overflow: auto;
      }
      .btn {
        color: white;
        background-color: green;
        padding: 2px;
        font-size: 1.2rem;
      }
      .reset {
        color: white;
        background-color: red;
        font-size: 1.2rem;
        border: none;
        border-radius: 10px;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Random Number Generator</h1>

      <div class="contain">
        <label for="">Minimum:</label>
        <input id="min" type="number" min="1" value="1" />

        <label for="">Maximum:</label>
        <input id="max" type="number" value="100" />
      </div>

      <button id="generate">Generate Random Number</button>
      <p id="randomNumber">Click the button to generate</p>

      <button id="reset">Reset</button>
    </div>
    <script>
      const min = document.getElementById("min");
      const max = document.getElementById("max");
      const genBtn = document.getElementById("generate");
      const resetBtn = document.getElementById("reset");
      const randNumDisplay = document.getElementById("randomNumber");

      function genRandNum() {
        const minVal = parseInt(min.value);
        const maxVal = parseInt(max.value);

        if (isNaN(minVal) || isNaN(maxVal) || minVal >= maxVal) {
          alert("Please enter valid minimum and maximum values.");
          return;
        }

        const randNum =
          Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
        randNumDisplay.textContent = randNum;
      }

      function reset() {
        min.value = 1;
        max.value = 100;
        randNumDisplay.textContent = "Click the button to generate";
      }

      genBtn.addEventListener("click", genRandNum);
      resetBtn.addEventListener("click", reset);
    </script>
  </body>
</html>
