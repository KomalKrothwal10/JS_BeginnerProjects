<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            height:100vh;
            background-color:#0c0c0c;
            display : flex;
            justify-content : center;
            align-items : center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .container{
            background-color:#dcaaaa;
            height:300px;
            width:500px;
            padding:10px;
            border-radius :10px;
            box-shadow:0 1px 1px rgba(0,0,0,0.5);
            margin:10px;
        }
        .container h2{
            text-align : center;
            margin-bottom : 10px;
        }
        .container textarea{
            width:100%;
            height:150px;
            padding:10px;
            font-size:16px;
            border-radius : 5px;
            border : none;
            box-shadow:0 1px 1px rgba(0,0,0,0.5);
        }
        .counter{
            display : flex;
            justify-content : space-between;
            margin-top : 10px;
            padding:0 10px;
        }
        .counter p{
            font-size:16px;
        }
        .counter span{
            font-weight : bold;
        }


    </style>
</head>
<body>
    <div class="container">
        <h2>Real Character Counter</h2>
        <textarea name="text" id="text" cols="30" rows="10" placeholder="Type something here..." maxlength="50"></textarea>

        <div class="counter">
            <p>
                Total Characters: <span class="charc" id="charc"></span>
            </p>
            <p>
                Remaining Characters : <span class="remc" id="remc"></span>
            </p>
        </div>
    </div>
    <script>
        const text = document.getElementById('text')
        const totalC = document.getElementById('charc')
        const remC = document.getElementById('remc')

        text.addEventListener("keyup",()=>{
            updateCounter()
        })

        function updateCounter(){
            totalC.innerText = text.value.length 
            remC.innerText = text.getAttribute("maxLength") - text.value.length
        }



    </script>
</body>
</html>
